name: Build Dynatrace Extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install dt-extensions-sdk[cli]

      - name: Write signing certificate
        run: echo "${{ secrets.EXTENSION_CERTIFICATE }}" > developer.pem

      - name: Write signing private key
        run: echo "${{ secrets.EXTENSION_PRIVATE_KEY }}" >> developer.pem

      - name: Build extension
        run: |
          dt-sdk build --private-key developer.pem --python-version 3.14
          
      - name: Clean up signing files
        if: always()
        run: rm -f developer.pem

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension
          path: dist/*.zip
